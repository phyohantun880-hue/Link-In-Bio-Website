<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link in Bio | My Space</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <div class="container">
        <header class="profile">
            <div class="avatar"></div>
            <h1>@YourName</h1>
            <p>Digital Creator | Exploring the vibes.</p>
        </header>

        <main class="links">
            <a href="https://t.me/yourusername" class="link-card" target="_blank">Telegram</a>
            <a href="https://youtube.com/c/yourchannel" class="link-card" target="_blank">YouTube</a>
            <a href="https://facebook.com/yourprofile" class="link-card" target="_blank">Facebook</a>
        </main>

        <button id="theme-toggle">Switch to Dark Mode</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
